<style>

const el = (tag, attrs = {}, ...kids) => {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') n.className = v;
    else if (k === 'html') n.innerHTML = v;
    else if (k.startsWith('on')) n.addEventListener(k.slice(2), v);
    else if (v === false || v == null) continue;
    else if (v === true) n.setAttribute(k, '');
    else n.setAttribute(k, v);
  }
  for (const k of kids.flat()) {
    if (k == null) continue;
    n.appendChild(typeof k === 'string' ? document.createTextNode(k) : k);
  }
  return n;

const SIGN_NAMES = ['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];

function lookupSabian(lon) {
  const normLon = ((lon % 360) + 360) % 360;
  const signIdx = Math.floor(normLon / 30);
  const signName = SIGN_NAMES[signIdx];
  const degInSign = normLon % 30;
  const degree = Math.max(1, Math.ceil(degInSign)); // round up, min 1
  const entry = SABIAN_DATA[signName][degree];
  return { sign: signName, degree, symbol: entry[0], keyword: entry[1] };
}

/* ─── Sun longitude (Meeus Astronomical Algorithms, Ch.25) ─── */
function julianDay(y, m, d, hourUT) {
  if (m <= 2) { y -= 1; m += 12; }
  const A = Math.trunc(y / 100);
  const B = 2 - A + Math.trunc(A / 4);
  return Math.trunc(365.25 * (y + 4716)) + Math.trunc(30.6001 * (m + 1)) + d + hourUT / 24 + B - 1524.5;
}
function norm360(x) { return ((x % 360) + 360) % 360; }
function sunLongitude(y, m, d, hourUT) {
  const JD = julianDay(y, m, d, hourUT);
  const T = (JD - 2451545.0) / 36525.0;
  const M = norm360(357.52911 + 35999.05029 * T - 0.0001537 * T * T) * Math.PI / 180;
  const e = 0.016708634 - 0.000042037 * T;
  const C = (1.914602 - 0.004817 * T - 0.000014 * T * T) * Math.sin(M)
          + (0.019993 - 0.000101 * T) * Math.sin(2 * M)
          + 0.000289 * Math.sin(3 * M);
  return norm360(280.46646 + 36000.76983 * T + 0.0003032 * T * T + C);
}

/* ─── Anthropic API — streaming ─── */
async function streamToElement(userPrompt, container) {
  if (!CONFIG.anthropicKey || CONFIG.anthropicKey === 'YOUR_ANTHROPIC_KEY_HERE') {
    throw new Error('No API key configured. Edit CONFIG.anthropicKey in app.html.');
  }
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': CONFIG.anthropicKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: CONFIG.model,
      max_tokens: CONFIG.maxTokens,
      system: SYNTHESIS_SYSTEM,
      messages: [{ role: 'user', content: userPrompt }],
      stream: true,
    }),
  });
  if (!response.ok) {
    const errText = await response.text();
    throw new Error(`API ${response.status}: ${errText}`);
  }
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let sseBuffer = '';
  let rawText = '';
  let started = false;
  const streamDiv = document.createElement('div');
  const cursor = el('span', { class: 'cursor' });

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    sseBuffer += decoder.decode(value, { stream: true });
    const lines = sseBuffer.split('\n');
    sseBuffer = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6).trim();
      if (data === '[DONE]') continue;
      try {
        const evt = JSON.parse(data);
        if (evt.type === 'content_block_delta' && evt.delta?.type === 'text_delta') {
          if (!started) {
            container.innerHTML = '';
            container.appendChild(streamDiv);
            container.appendChild(cursor);
            started = true;
          }
          rawText += evt.delta.text;
          streamDiv.innerHTML = renderMd(rawText);
        }
      } catch (_) {}
    }
  }
  cursor.remove();
  container.innerHTML = renderMd(rawText);
  return rawText;
}

/* ─── Seeded random (for placeholder placements) ─── */
function seededRand(seed) {
  let h = 2166136261;
  for (let i = 0; i < seed.length; i++) { h ^= seed.charCodeAt(i); h = Math.imul(h, 16777619); }
  return () => {
    h += 0x6D2B79F5;
    let t = h;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

/* ─── Numerology ─── */
function reduceNumber(n, allowMaster = true) {
  while (n > 9 && !(allowMaster && (n === 11 || n === 22 || n === 33))) {
    n = String(n).split('').reduce((a, d) => a + Number(d), 0);
  }
  return n;
}
function lifePath(y, m, d) {
  return reduceNumber(reduceNumber(y, false) + reduceNumber(m, false) + reduceNumber(d, false), true);
}
const LETTER_VALUES = {a:1,j:1,s:1,b:2,k:2,t:2,c:3,l:3,u:3,d:4,m:4,v:4,e:5,n:5,w:5,f:6,o:6,x:6,g:7,p:7,y:7,h:8,q:8,z:8,i:9,r:9};
const VOWELS = new Set(['a','e','i','o','u']);
function nameNumerology(name) {
  const clean = name.toLowerCase().replace(/[^a-z]/g, '');
  let expression = 0, soul = 0, personality = 0;
  for (const ch of clean) {
    const v = LETTER_VALUES[ch] || 0;
    expression += v;
    if (VOWELS.has(ch)) soul += v; else personality += v;
  }
  return { expression: reduceNumber(expression,true), soul: reduceNumber(soul,true), personality: reduceNumber(personality,true) };
}

async function fetchHD(form, utcOffset) {
  if (!CONFIG.hdKey || form.timeUnknown || !form.time) return null;
  const [y, m, d] = form.date.split('-').map(Number);
  const [h, min] = form.time.split(':').map(Number);

/* ─── Compute chart ─── */
function computeChart(form, hdApiData) {
  const [y, m, d] = form.date.split('-').map(Number);
  // Estimate UTC offset from geocoded longitude (±1hr accuracy, fine for Sun)
  const estOffset = form.geo ? Math.round(form.geo.lon / 15) : 0;
  let hourUT = 12; // noon default if time unknown
  if (!form.timeUnknown && form.time) {
    const [h, min] = form.time.split(':').map(Number);
    hourUT = h + min / 60 - estOffset;
  }

  // Real Sun longitude (Meeus)
  const sunLon = sunLongitude(y, m, d, hourUT);
  const sunSignIdx = Math.floor(sunLon / 30);
  const sunDegInSign = sunLon % 30;
  const sunSignName = SIGNS[sunSignIdx];
  const sunSabian = lookupSabian(sunLon);

  // Seeded random for placeholder placements (Moon, Rising, other planets)
  const rand = seededRand(`${form.name}|${form.date}|${form.time}|${form.city}`);
  const moonSign = SIGNS[Math.floor(rand() * 12)];
  const moonDeg = Math.floor(rand() * 30);
  const rising = form.timeUnknown ? null : SIGNS[Math.floor(rand() * 12)];
  const risingLon = form.timeUnknown ? null : (SIGNS.indexOf(rising) * 30 + Math.floor(rand() * 30));
  const ascSabian = risingLon != null ? lookupSabian(risingLon) : null;
  const venus = SIGNS[Math.floor(rand() * 12)];
  const mars = SIGNS[Math.floor(rand() * 12)];
  const mercury = SIGNS[Math.floor(rand() * 12)];

  const NAKSHATRAS = ['Ashwini','Bharani','Krittika','Rohini','Mrigashira','Ardra','Punarvasu','Pushya','Ashlesha','Magha','Purva Phalguni','Uttara Phalguni','Hasta','Chitra','Swati','Vishakha','Anuradha','Jyeshtha','Mula','Purva Ashadha','Uttara Ashadha','Shravana','Dhanishta','Shatabhisha','Purva Bhadrapada','Uttara Bhadrapada','Revati'];
  const nakshatra = NAKSHATRAS[Math.floor(rand() * NAKSHATRAS.length)];
  const vedicMoon = SIGNS[Math.floor(rand() * 12)];

  const HD_TYPES = ['Generator','Manifesting Generator','Projector','Manifestor','Reflector'];
  const HD_AUTHS = ['Sacral','Emotional','Splenic','Self-Projected','Ego','Mental','Lunar'];
  const HD_PROFILES = ['1/3','1/4','2/4','2/5','3/5','3/6','4/6','4/1','5/1','5/2','6/2','6/3'];
  const STEMS = ['Jia (Yang Wood)','Yi (Yin Wood)','Bing (Yang Fire)','Ding (Yin Fire)','Wu (Yang Earth)','Ji (Yin Earth)','Geng (Yang Metal)','Xin (Yin Metal)','Ren (Yang Water)','Gui (Yin Water)'];

  // Use HD API data if available, otherwise seeded placeholder
  let hdType, hdAuthority, hdProfile, hdCross, hdChannels, hdGates;
  if (hdApiData) {
    hdType = hdApiData.type || hdApiData.energy_type;
    hdAuthority = hdApiData.authority || hdApiData.inner_authority;
    hdProfile = hdApiData.profile;
    hdCross = hdApiData.incarnation_cross || hdApiData.cross;
    hdChannels = (hdApiData.channels_short || []).join(', ');
    hdGates = (hdApiData.gates || []).join(', ');
  } else if (!form.timeUnknown) {
    hdType = HD_TYPES[Math.floor(rand() * HD_TYPES.length)];
    hdAuthority = HD_AUTHS[Math.floor(rand() * HD_AUTHS.length)];
    hdProfile = HD_PROFILES[Math.floor(rand() * HD_PROFILES.length)];
    hdCross = `Gate ${Math.floor(rand()*64)+1}/${Math.floor(rand()*64)+1}`;
    hdChannels = null;
    hdGates = null;
  }

  const ch = chineseZodiac(y, m, d);
  const numName = nameNumerology(form.name);
  const lp = lifePath(y, m, d);

  // Age and audience
  const today = new Date();
  const birth = new Date(`${form.date}T00:00:00`);
  let age = today.getFullYear() - birth.getFullYear();
  if (today < new Date(today.getFullYear(), birth.getMonth(), birth.getDate())) age--;
  const audience = age < 13 ? 'minor' : age < 18 ? 'teen' : 'adult';

  return {
    age, audience,
    western: {
      sun: { sign: sunSignName, deg: Math.floor(sunDegInSign * 10) / 10, element: ELEMENTS[sunSignName], modality: MODALITY[sunSignName], sabian: sunSabian },

function audienceFraming(audience, name) {
  const firstName = name.split(' ')[0];
  if (audience === 'minor') return `AUDIENCE: This subject is a child under 13. Write in THIRD PERSON throughout, addressed to the parent. Use the child's first name: ${firstName}. Example: "${firstName} has a Moon in..." Never use "you" to address the child.`;
  if (audience === 'teen') return `AUDIENCE: This subject is 13–17. Write in second person. Open with one sentence acknowledging you are writing directly to them and that their parent may also read this.`;
  return `AUDIENCE: Adult (18+). Standard second person ("you").`;
}

    gene_keys: 'Include: Life\'s Work gate, Evolution gate, Radiance gate, Purpose gate. Note these are approximate.',
    enneagram: chart.enneagram ? `Include: Type, Wing, Instinct. All three if provided. Core fear, core desire, integration/disintegration paths.` : 'Enneagram was not provided — skip this section.',
  }[system.id] || '';

  return `${audienceFraming(chart.audience, form.name)}

Chart facts:
${chartFacts(chart, form)}

Write the "${system.name}" section of the Chart Glossary.
${dataNote}

Format each entry exactly as: **[Placement and value]** — [1–2 sentences personalized to this person.]

Write to the person directly: "Your Taurus Sun in the first house..." not "Taurus Sun means..."
Each sentence must be specific to this person's chart — not generic definitions.
1–2 sentences per entry is a firm limit.

Output only the entries. No heading. No intro line. No bullet markers except the **bold** format shown.`;
}

/* ─── Markdown renderer ─── */
function renderMd(src) {
  let s = src.trim();
  s = s.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  s = s.replace(/^##\s+(.+)$/gm, '<h4 class="bp-sub">$1</h4>');
  s = s.replace(/ALIGNMENT_STATEMENT:\s*([^\n]+)/, '<p class="alignment-statement">$1</p>');
  s = s.replace(/<em>(Sabian Symbol[^<]+)<\/em>/g, '<p class="sabian"><em>$1</em></p>');
  s = s.split(/\n{2,}/).map(p => {
    p = p.trim();
    if (!p) return '';
    if (/^<(h4|p)/.test(p)) return p;
    return `<p>${p.replace(/\n/g, ' ')}</p>`;
  }).join('\n');
  return s;
}

function stripMd(s) {
  return s.replace(/^##\s+/gm,'').replace(/\*\*([^*]+)\*\*/g,'$1').replace(/\*([^*]+)\*/g,'$1').replace(/ALIGNMENT_STATEMENT:\s*/,'— ').trim();
}

/* ─── Geocoding ─── */
let geocodeTimer = null, lastQuery = '';
function setupGeocode(input, statusEl) {
  input.addEventListener('input', () => {
    state.form.city = input.value;
    state.form.geo = null;
    const q = input.value.trim();
    statusEl.textContent = '';
    statusEl.className = 'field-help';
    if (geocodeTimer) clearTimeout(geocodeTimer);
    if (q.length < 3) return;
    if (q === lastQuery) return;
    lastQuery = q;
    statusEl.textContent = 'Looking up…';
    geocodeTimer = setTimeout(() => geocode(q, statusEl), 600);
  });
}
async function geocode(q, statusEl) {
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(q)}`, { headers: {'Accept':'application/json'} });
    if (!res.ok) throw new Error();
    const data = await res.json();
    if (!data.length) { statusEl.textContent = "Couldn't find that city. Try adding the country, or use coordinates."; statusEl.className = 'field-help err'; return; }
    const r = data[0];
    state.form.geo = { lat: parseFloat(r.lat), lon: parseFloat(r.lon), display: r.display_name };
    statusEl.textContent = `${Number(r.lat).toFixed(2)}°${r.lat>=0?'N':'S'} · ${Number(r.lon).toFixed(2)}°${r.lon>=0?'E':'W'} · ${r.display_name.split(',').slice(-3).join(',').trim()}`;
    statusEl.className = 'field-help ok';
  } catch (_) { statusEl.textContent = "Couldn't reach the geocoder. Continuing without coordinates."; statusEl.className = 'field-help err'; }
}

function validate() {
  const errs = [];
  const f = state.form;
  if (!f.name || f.name.trim().length < 2) errs.push('Name is empty. Use the name on the birth certificate.');
  if (!f.date) errs.push('Birth date is empty.');
  if (!f.timeUnknown && !f.time) errs.push("Birth time is empty. If you don't know it, use the toggle above — don't guess.");
  if (!f.city || f.city.trim().length < 2) errs.push('Birth city is empty.');
  return errs;
}

function sysSummary(id) {
  const c = state.chart;
  switch(id) {
    case 'western': return `Sun ${c.western.sun.deg.toFixed(0)}° ${c.western.sun.sign} · Moon ${c.western.moon.sign}${c.western.rising?' · Rising '+c.western.rising.sign:''}`;
    case 'vedic': return `Moon ${c.vedic.moonSign} · ${c.vedic.nakshatra}`;
    case 'human': return c.humanDesign ? `${c.humanDesign.type} · ${c.humanDesign.profile} · ${c.humanDesign.authority}` : '';
    case 'bazi': return `${c.bazi.yearPillar} · ${c.bazi.dayMaster.split(' ')[0]} Day`;
    case 'numerology': return `Life Path ${c.numerology.lifePath} · Expression ${c.numerology.expression}`;
    case 'gene_keys': return `Life's Work Gate ${c.geneKeys.lifesWork} · Evolution Gate ${c.geneKeys.evolution}`;
    case 'enneagram': return c.enneagram ? `${c.enneagram.type}${c.enneagram.wing?'w'+c.enneagram.wing:''}${c.enneagram.instinct?' '+c.enneagram.instinct:''}` : '';
    default: return '';
  }
}

function accordion({id, idx, title, intro, eyebrow, onExpand}) {
  const body = el('div',{class:'acc-body',id:id+'-body'});
  let loaded = false, loading = false;
  const header = el('button',{type:'button',class:'acc-header','aria-expanded':'false',onclick:async()=>{
    const open = header.classList.toggle('is-open');
    header.setAttribute('aria-expanded', open?'true':'false');
    body.classList.toggle('is-open', open);
    if (open && !loaded && !loading) {
      loading = true;
      body.innerHTML = '<div class="acc-loading"><span class="orbital-sm" aria-hidden="true"></span><span>Writing this section.</span></div>';
      try { await onExpand(body); loaded = true; }
      catch (e) { body.innerHTML = '<p class="err-inline">The synthesis didn\'t complete. This is usually an API key issue or a timeout. Try again.</p>'; }
      finally { loading = false; }
    }
  }},
    idx ? el('span',{class:'acc-num'},String(idx).padStart(2,'0')) : null,
    el('span',{class:'acc-text'},
      el('span',{class:'acc-title'},title),
      intro ? el('span',{class:'acc-intro'},intro) : null,
      eyebrow ? el('span',{class:'acc-eyebrow'},eyebrow) : null,
    ),
    el('span',{class:'acc-chevron','aria-hidden':'true'}),
  );
  return el('div',{class:'acc'},header,body);
}

/* ─── Streaming runners ─── */
async function streamBlueprint() {
  const body = $('#blueprint-body');
  body.innerHTML = '<div class="bp-loading"><span class="orbital-sm" aria-hidden="true"></span><span id="bp-msg">Running your chart across six systems. This takes a moment — they\'ve been at this longer than we have.</span></div>';
  const msgSwap = setTimeout(() => {
    const t = $('#bp-msg');
    if (t) { t.style.transition='opacity 240ms ease-out'; t.style.opacity='0'; setTimeout(()=>{ t.textContent='Writing your reading. This is the long part. Worth it.'; t.style.opacity='1'; },240); }
  }, 1800);
  try {
    const prompt = blueprintPrompt(state.chart, state.form);
    clearTimeout(msgSwap);
    const text = await streamToElement(prompt, body);
    state.reading.blueprint = text;
  } catch (e) {
    clearTimeout(msgSwap);
    body.innerHTML = `<p class="err-inline">The synthesis didn't complete. ${e.message || 'Check your API key and try again.'}</p>`;
    throw e;
  }
}

async function loadDeepDive(section, container) {

  state.reading.deepDive[section.id] = text;
  container.innerHTML = renderMd(text);
  container.style.opacity = '0'; container.style.transform = 'translateY(6px)';
  requestAnimationFrame(() => { container.style.transition='opacity 600ms cubic-bezier(0.16,1,0.3,1),transform 600ms cubic-bezier(0.16,1,0.3,1)'; container.style.opacity='1'; container.style.transform='translateY(0)'; });
}

async function loadGlossary(system, container) {
  const prompt = glossaryPrompt(state.chart, state.form, system);

  state.reading.glossary[system.id] = text;
  const html = text.split('\n').filter(Boolean).map(line => `<p class="gl-entry">${renderMd(line).replace(/^<p>|<\/p>$/g,'')}</p>`).join('');

  container.style.opacity = '0'; container.style.transform = 'translateY(6px)';
  requestAnimationFrame(() => { container.style.transition='opacity 600ms cubic-bezier(0.16,1,0.3,1),transform 600ms cubic-bezier(0.16,1,0.3,1)'; container.style.opacity='1'; container.style.transform='translateY(0)'; });

/* ─── Copy ─── */
async function copyFullReading(){
  const f = state.form, c = state.chart;
  const dt = new Date(f.date+'T00:00:00').toLocaleDateString('en-US',{day:'numeric',month:'long',year:'numeric'});
  let out = `un/charted — natal chart synthesis\n${f.name} · ${dt}${f.timeUnknown?'':' · '+f.time} · ${f.geo?.display||f.city}\n\n———\n\nTHE BLUEPRINT\n\n`;
  out += stripMd(state.reading.blueprint)+'\n\n———\n\nTHE DEEP DIVE\n\n';
  for (let i=0; i<DEEP_DIVE_SECTIONS.length; i++){
    const s=DEEP_DIVE_SECTIONS[i];
    out+=`${String(i+1).padStart(2,'0')} · ${s.title}\n${s.intro}\n\n`;
    out+=(state.reading.deepDive[s.id]?stripMd(state.reading.deepDive[s.id]):'[ Not yet expanded ]')+'\n\n';
  }
  out+='———\n\nYOUR CHART AT A GLANCE\n\n';
  for (const sys of SYSTEMS){
    if(sys.optional&&!c.enneagram)continue;
    if(sys.id==='human'&&!c.humanDesign)continue;
    out+=`${sys.name}\n`+(state.reading.glossary[sys.id]?stripMd(state.reading.glossary[sys.id]):'[ Not yet expanded ]')+'\n\n';
  }
  try {
    await navigator.clipboard.writeText(out);
    const btn=$('#copy-btn');
    const orig=btn.textContent;
    btn.textContent='Copied';
    setTimeout(()=>{btn.textContent=orig;},2000);
  } catch(_){alert("Couldn't copy. Your browser may be blocking clipboard access.");}
}
