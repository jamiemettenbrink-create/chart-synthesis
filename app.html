<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0D0D11"/>
<title>un/charted</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230D0D11'/%3E%3Cg stroke='%23EDE8DC' stroke-opacity='0.55' stroke-width='2' fill='none'%3E%3Cline x1='22' y1='26' x2='50' y2='16'/%3E%3Cline x1='50' y1='16' x2='78' y2='32'/%3E%3Cline x1='78' y1='32' x2='70' y2='64'/%3E%3Cline x1='70' y1='64' x2='38' y2='78'/%3E%3Cline x1='38' y1='78' x2='16' y2='58'/%3E%3Cline x1='16' y1='58' x2='22' y2='26'/%3E%3Cline x1='50' y1='16' x2='70' y2='64'/%3E%3Cline x1='44' y1='44' x2='70' y2='64'/%3E%3C/g%3E%3Cg fill='%23EDE8DC'%3E%3Ccircle cx='22' cy='26' r='4'/%3E%3Ccircle cx='50' cy='16' r='4'/%3E%3Ccircle cx='78' cy='32' r='4'/%3E%3Ccircle cx='38' cy='78' r='4'/%3E%3Ccircle cx='16' cy='58' r='4'/%3E%3Ccircle cx='44' cy='44' r='4'/%3E%3C/g%3E%3Ccircle cx='70' cy='64' r='6' fill='%23C8A96E'/%3E%3C/svg%3E"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
:root{
  --void:#0D0D11;--void-soft:#0F0F14;--iron:#1A1D26;--iron-soft:#161922;
  --slate:#3A4158;--slate-soft:#2A2F3F;--pewter:#7A869E;--pewter-soft:#5E6B83;
  --auric:#C8A96E;--auric-dim:rgba(200,169,110,0.65);--auric-faint:rgba(200,169,110,0.14);
  --parchment:#EDE8DC;--rust:#C76A6A;
  --display:"Cormorant Garamond","EB Garamond",Georgia,serif;
  --ui:"DM Sans","Inter",system-ui,-apple-system,sans-serif;
  --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,monospace;
  --ease-reveal:cubic-bezier(0.16,1,0.3,1);
  --gutter:22px;--max:720px;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
html{background:var(--void)}
body{background:var(--void);color:var(--parchment);font-family:var(--ui);font-size:16px;font-weight:400;line-height:1.75;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;min-height:100vh;overflow-x:hidden}
::selection{background:var(--auric);color:var(--void)}
button{font:inherit;color:inherit}
input,select,textarea{font:inherit;color:inherit}
#app{position:relative;min-height:100vh}
.shell{position:relative;z-index:2;max-width:var(--max);margin:0 auto;padding:28px var(--gutter) 96px}
.wm{font-family:var(--display);font-weight:500;line-height:1;letter-spacing:-0.01em;display:inline-flex;align-items:baseline}
.wm .prefix{color:var(--auric);letter-spacing:-0.06em;padding-right:0.02em}
.wm .resolve{color:var(--parchment);letter-spacing:-0.005em}
.eyebrow{font-family:var(--ui);font-size:12.5px;font-weight:500;letter-spacing:0.09em;text-transform:uppercase;color:var(--pewter);margin:0}
.orbit-backdrop{position:fixed;top:50%;right:-42vw;transform:translateY(-50%);width:95vw;height:95vw;max-width:820px;max-height:820px;pointer-events:none;z-index:1;opacity:0.42;animation:slow-drift 60s linear infinite}
.orbit-backdrop .ring{position:absolute;inset:0;border-radius:50%;border:1px solid var(--slate)}
.orbit-backdrop .r2{inset:14%;border-color:rgba(58,65,88,0.6)}
.orbit-backdrop .r3{inset:28%;border-color:rgba(58,65,88,0.35)}
.orbit-backdrop .pt{position:absolute;width:6px;height:6px;border-radius:50%;background:var(--auric);top:50%;left:0;transform:translate(-50%,-50%);box-shadow:0 0 18px rgba(200,169,110,0.5)}
@keyframes slow-drift{from{transform:translateY(-50%) rotate(0deg)}to{transform:translateY(-50%) rotate(360deg)}}
@media(max-width:500px){.orbit-backdrop{opacity:0.32}}
.app-header--form{position:sticky;top:0;z-index:30;margin:-28px calc(var(--gutter)*-1) 32px;padding:18px var(--gutter) 16px;background:rgba(13,13,17,0.85);backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);border-bottom:1px solid var(--slate-soft);text-align:left;display:flex;flex-direction:column;gap:6px}
.app-header--form .lockup{font-size:36px}
.app-header--form .tagline{font-family:var(--display);font-style:italic;font-size:16px;color:var(--auric);margin:0;line-height:1.3}
.lede{font-family:var(--display);font-weight:400;font-size:22px;line-height:1.35;color:var(--parchment);margin:0 0 40px;text-wrap:pretty}
.form{display:flex;flex-direction:column;gap:22px}
.field{display:flex;flex-direction:column;gap:8px}
.field-label-row{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;row-gap:6px}
.field label{font-family:var(--ui);font-weight:500;font-size:12.5px;letter-spacing:0.09em;text-transform:uppercase;color:var(--pewter);white-space:nowrap}
.field-aside{font-family:var(--mono);font-size:11px;color:var(--pewter-soft);text-transform:uppercase;letter-spacing:0.09em}
.field input,.field select{background:var(--void);border:1px solid var(--slate);color:var(--parchment);font-family:var(--ui);font-size:16px;padding:14px;outline:none;transition:border-color 150ms ease-out,background 150ms ease-out;width:100%;min-height:48px;border-radius:0;-webkit-appearance:none;appearance:none}
.field input:focus,.field select:focus{border-color:var(--auric)}
.field input::placeholder{color:var(--pewter-soft)}
.field input:disabled{color:var(--pewter-soft);background:var(--iron-soft);border-color:var(--slate-soft)}
.field input[type="date"],.field input[type="time"]{color-scheme:dark}
.field select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 8' fill='none'><path d='M1 1.5L6 6.5L11 1.5' stroke='%237A869E' stroke-width='1.2'/></svg>");background-repeat:no-repeat;background-position:right 14px center;background-size:12px 8px;padding-right:38px}
.field-help{font-family:var(--mono);font-size:12.5px;color:var(--pewter);margin:0;line-height:1.55;letter-spacing:0.01em}
.field-help.err{color:var(--rust)}
.places-search{display:flex;gap:10px;align-items:stretch;flex-wrap:wrap}
.places-search input{flex:1;min-width:200px;background:var(--void);border:1px solid var(--slate);color:var(--parchment);font-family:var(--ui);font-size:16px;padding:14px;outline:none;transition:border-color 150ms ease-out,background 150ms ease-out;min-height:52px;border-radius:0;-webkit-appearance:none;appearance:none}
.places-search input:focus{border-color:var(--auric)}
.places-search input::placeholder{color:var(--pewter-soft)}
.places-search .btn{flex-shrink:0;white-space:nowrap}
.ennea-row{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:6px}
.time-toggle{display:inline-flex;align-items:center;gap:10px;background:transparent;border:0;padding:8px 0;cursor:pointer;font-family:var(--ui);font-weight:500;font-size:12px;letter-spacing:0.09em;text-transform:uppercase;color:var(--pewter);transition:color 150ms ease-out;white-space:nowrap;flex-shrink:0;min-height:44px}
.time-toggle:hover{color:var(--parchment)}
.time-toggle.is-on{color:var(--auric)}
.time-toggle .dot{width:36px;height:20px;border:1px solid var(--slate);border-radius:999px;position:relative;transition:border-color 150ms ease-out,background 150ms ease-out}
.time-toggle .dot::after{content:'';position:absolute;top:50%;left:3px;width:12px;height:12px;border-radius:50%;background:var(--pewter);transform:translateY(-50%);transition:left 200ms var(--ease-reveal),background 150ms ease-out}
.time-toggle .dot.is-on{border-color:var(--auric);background:rgba(200,169,110,0.12)}
.time-toggle .dot.is-on::after{left:20px;background:var(--auric)}
.form-err{font-family:var(--ui);font-size:13px;color:var(--rust);margin:0;line-height:1.5;max-height:0;opacity:0;overflow:hidden;transition:max-height 240ms var(--ease-reveal),opacity 240ms ease-out}
.form-err.show{max-height:80px;opacity:1}
.btn{font-family:var(--ui);font-weight:500;font-size:12.5px;letter-spacing:0.12em;text-transform:uppercase;padding:18px 24px;border:1px solid var(--slate);background:transparent;color:var(--parchment);cursor:pointer;transition:opacity 150ms ease-out,background 150ms ease-out,color 150ms ease-out,border-color 150ms ease-out;min-height:52px}
.btn:hover{background:var(--iron)}
.btn:disabled{cursor:default;opacity:0.5}
.btn-primary{background:var(--auric);color:var(--void);border-color:var(--auric)}
.btn-primary:hover{opacity:0.88;background:var(--auric)}
.btn-ghost{color:var(--pewter);border-color:transparent}
.btn-ghost:hover{color:var(--parchment);background:var(--iron);border-color:var(--slate)}
.btn-line{background:transparent;border-color:var(--slate);color:var(--parchment)}
.btn-block{width:100%;display:block}
.form-footer{margin-top:56px;border-top:1px solid var(--slate-soft);padding-top:22px}
.form-footer p{font-family:var(--mono);font-size:11.5px;color:var(--pewter-soft);letter-spacing:0.06em;margin:0;text-transform:uppercase}
.app-header--reading{margin:-28px calc(var(--gutter)*-1) 32px;padding:14px var(--gutter);background:rgba(13,13,17,0.85);backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);border-bottom:1px solid var(--slate-soft);position:sticky;top:0;z-index:30;display:flex;flex-direction:column;gap:10px}
.app-header--reading .mk-only .mk{width:26px;height:26px}
.profile-summary{display:grid;grid-template-columns:1fr auto;align-items:start;gap:14px;background:transparent;border:0;padding:0;cursor:pointer;text-align:left;width:100%;transition:opacity 150ms ease-out}
.profile-summary:hover{opacity:0.85}
.ps-line{display:flex;flex-direction:column;align-items:flex-start;gap:2px;flex:1;min-width:0;line-height:1.35}
.ps-name{font-family:var(--display);font-weight:500;font-size:20px;color:var(--parchment);letter-spacing:-0.005em;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.ps-sep{color:var(--slate);font-size:11px;align-self:center}
.ps-meta{font-family:var(--ui);font-size:13px;color:var(--pewter);letter-spacing:0.01em;white-space:nowrap}
.ps-meta-row{display:flex;flex-wrap:wrap;align-items:baseline;gap:8px}
.edit-link{display:inline-flex;align-items:center;gap:6px;font-family:var(--ui);font-weight:500;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:var(--pewter);flex-shrink:0;transition:color 150ms ease-out;padding-top:4px}
.edit-link svg{stroke:currentColor}
.profile-summary:hover .edit-link{color:var(--auric)}
.blueprint{margin-top:48px;padding-bottom:56px;border-bottom:1px solid var(--slate-soft);animation:fade-up 700ms var(--ease-reveal) both}
.blueprint .eyebrow{margin-bottom:28px}
.blueprint-body{font-family:var(--display);font-weight:400;font-size:19px;line-height:1.55;color:var(--parchment);text-wrap:pretty;letter-spacing:0.005em}
.blueprint-body p{margin:0 0 20px;max-width:38em}
.blueprint-body h4.bp-sub{font-family:var(--display);font-weight:500;font-size:32px;line-height:1.15;color:var(--parchment);margin:32px 0 14px;letter-spacing:-0.005em;text-wrap:balance}
.blueprint-body h4.bp-sub:first-child{margin-top:0}
.blueprint-body p.sabian{padding:4px 0 4px 22px;border-left:2px solid var(--auric-dim);color:var(--auric);font-family:var(--display);font-style:italic;font-size:21px;line-height:1.4;margin:22px 0 28px;max-width:52ch}
.blueprint-body strong{color:var(--parchment);font-weight:500}
.blueprint-body em{color:var(--auric);font-style:italic}
.alignment-statement{font-family:var(--display);font-style:italic;font-weight:400;font-size:24px!important;line-height:1.4;color:var(--auric);text-align:center;max-width:32ch!important;margin:40px auto 0!important;padding-top:32px;border-top:1px solid var(--auric-faint);text-wrap:pretty}
.cursor{display:inline-block;width:7px;height:1.1em;background:var(--auric);vertical-align:-0.18em;margin-left:2px;animation:blink 900ms steps(2,start) infinite}
@keyframes blink{0%,50%{opacity:1}50.01%,100%{opacity:0}}
.rv{opacity:0;transition:opacity 420ms cubic-bezier(0.16,1,0.3,1)}
.rv.on{opacity:1}
.bp-loading,.acc-loading{display:flex;align-items:center;gap:16px;padding:14px 0;color:var(--pewter);font-family:var(--display);font-style:italic;font-size:17px;line-height:1.45;max-width:56ch}
.acc-loading{font-size:15px;padding:8px 0}
/* Brand mark — 7-point constellation, locked composition */
.mk{display:block;flex-shrink:0}
.lockup{display:inline-flex;align-items:center;gap:0.38em;font-size:48px}
.lockup .mk{width:0.85em;height:0.85em}
.mk-only{display:inline-flex;align-items:center}
@keyframes mk-pulse{0%,100%{opacity:0.28}40%,60%{opacity:1}}
@keyframes mk-gold{0%,100%{opacity:0.85}50%{opacity:1}}
.mk.is-loading .mk-pt{animation:mk-pulse 2.4s var(--ease-reveal) infinite}
.mk.is-loading .mk-pt-0{animation-delay:0ms}
.mk.is-loading .mk-pt-1{animation-delay:180ms}
.mk.is-loading .mk-pt-2{animation-delay:360ms}
.mk.is-loading .mk-pt-3{animation-delay:540ms}
.mk.is-loading .mk-pt-4{animation-delay:720ms}
.mk.is-loading .mk-pt-5{animation-delay:900ms}
.mk.is-loading .mk-gold{animation:mk-gold 2.4s var(--ease-reveal) infinite}
.deep-dive,.glossary{margin-top:56px}
.deep-dive .eyebrow,.glossary .eyebrow{margin-bottom:20px}
.glossary-intro{font-family:var(--display);font-weight:400;font-size:19px;line-height:1.45;color:var(--pewter);max-width:56ch;margin:0 0 28px;text-wrap:pretty}
/* ─── Astrocartography sections + core/addon layering ─── */
.places{margin-top:56px}
.acg-map-wrap{border:1px solid var(--slate);border-radius:10px;overflow:hidden;margin:6px 0 22px;background:#11141b}
.addon-section{margin-top:56px;padding-top:52px;border-top:1px solid var(--slate)}
.addon-section .eyebrow{color:var(--auric)}
.addon-sub{font-family:var(--display);font-style:italic;font-size:18px;color:var(--pewter);margin:14px 0 24px;max-width:52ch;text-wrap:pretty}
.addon-deepdive{margin-top:48px}
/* ─── Sticky in-page jump navigation — pins directly below the (also sticky)
   reading header. --reading-header-h / --sticky-stack-h are measured in JS so the
   offsets track the header's real height across breakpoints and name-wrapping. ─── */
.jump-nav{position:sticky;top:var(--reading-header-h,0px);z-index:25;display:flex;flex-wrap:nowrap;gap:2px;align-items:stretch;margin:-20px calc(var(--gutter)*-1) 10px;padding:0 calc(var(--gutter) - 14px);background:rgba(13,13,17,0.92);backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);border-bottom:1px solid var(--slate-soft);overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.jump-nav::-webkit-scrollbar{display:none}
.jump-link{position:relative;font-family:var(--ui);font-weight:500;font-size:11px;letter-spacing:0.11em;text-transform:uppercase;color:var(--pewter);background:transparent;border:0;border-bottom:1.5px solid transparent;padding:13px 14px 12px;cursor:pointer;white-space:nowrap;transition:color 200ms var(--ease-reveal),border-color 200ms var(--ease-reveal)}
.jump-link:hover{color:var(--parchment)}
.jump-link.is-active{color:var(--auric);border-bottom-color:var(--auric)}
.blueprint,.deep-dive,.glossary,.places,.addon-section{scroll-margin-top:calc(var(--sticky-stack-h,116px) + 14px)}
.acc{border-top:1px solid var(--slate-soft)}
.deep-dive .acc:last-child,.glossary .acc:last-child{border-bottom:1px solid var(--slate-soft)}
.acc-header{display:grid;grid-template-columns:30px 1fr 18px;gap:10px;align-items:start;width:100%;background:transparent;border:0;padding:22px 0;cursor:pointer;text-align:left;min-height:56px;transition:opacity 150ms ease-out}
.glossary .acc-header{grid-template-columns:1fr 18px}
.acc-header:hover{opacity:0.86}
.acc-num{font-family:var(--mono);font-size:12.5px;color:var(--pewter-soft);letter-spacing:0.06em;padding-top:8px}
.acc-text{display:flex;flex-direction:column;gap:8px;min-width:0}
.acc-title{font-family:var(--display);font-weight:500;font-size:20px;line-height:1.22;color:var(--parchment);letter-spacing:-0.01em;display:block}
.glossary .acc-title{font-size:20px}
.acc-intro{font-family:var(--ui);font-weight:400;font-size:14px;line-height:1.5;color:#A8B1C4;letter-spacing:0.005em;max-width:52ch}
.acc-eyebrow{font-family:var(--mono);font-size:12.5px;color:var(--pewter);letter-spacing:0.04em;line-height:1.5}
.acc-chevron{width:18px;height:18px;position:relative;margin-top:7px;flex-shrink:0;transition:transform 280ms var(--ease-reveal)}
.acc-chevron::before,.acc-chevron::after{content:'';position:absolute;background:var(--pewter);top:50%;width:8px;height:1px}
.acc-chevron::before{left:2px;transform:translateY(-50%) rotate(45deg);transform-origin:right center}
.acc-chevron::after{right:2px;transform:translateY(-50%) rotate(-45deg);transform-origin:left center}
.acc-header.is-open .acc-chevron{transform:rotate(180deg)}
.acc-header.is-open .acc-chevron::before,.acc-header.is-open .acc-chevron::after{background:var(--auric)}
.acc-body{overflow:hidden;max-height:0;transition:max-height 480ms var(--ease-reveal),padding 480ms var(--ease-reveal)}
.acc-body.is-open{max-height:6000px;padding:4px 0 30px}
.deep-dive .acc-body.is-open{padding-left:40px}
.acc-body p{margin:0 0 16px;font-family:var(--ui);font-size:15.5px;line-height:1.78;color:var(--parchment);max-width:64ch}
.acc-body p:last-child{margin-bottom:0}
.acc-body strong{color:var(--parchment);font-weight:500}
.acc-body em{color:var(--auric);font-style:italic}
.gl-entry{border-bottom:1px dashed rgba(58,65,88,0.45);padding:14px 0;margin:0!important}
.gl-entry:last-child{border-bottom:0;padding-bottom:0}
.gl-entry:first-child{padding-top:4px}
.gl-entry strong{color:var(--auric);font-family:var(--display);font-weight:500;font-size:16px;letter-spacing:-0.005em}
.err-inline{color:var(--rust);font-family:var(--ui);font-size:14px;margin:0;padding:8px 0}
.copy-wrap{margin-top:56px;opacity:0;transform:translateY(10px);transition:opacity 600ms var(--ease-reveal),transform 600ms var(--ease-reveal)}
#copy-btn{opacity:0;transform:translateY(6px);transition:opacity 500ms var(--ease-reveal),transform 500ms var(--ease-reveal),background 150ms ease-out}
#copy-btn.show{opacity:1;transform:translateY(0)}
.copy-wrap:has(#copy-btn.show){opacity:1;transform:translateY(0)}
.reading-footer{margin-top:80px;padding-top:32px;border-top:1px solid var(--slate-soft);text-align:center}
.reading-footer .end{font-family:var(--display);font-style:italic;color:var(--auric);font-size:17px;margin:0}
.edit-overlay{position:fixed;inset:0;background:rgba(13,13,17,0.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:100;opacity:0;transition:opacity 240ms ease-out;display:flex;align-items:flex-end;justify-content:center}
.edit-overlay.show{opacity:1}
.edit-sheet{width:100%;max-width:560px;max-height:92vh;overflow-y:auto;background:var(--iron);border-top:1px solid var(--slate);padding:28px var(--gutter) calc(28px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform 360ms var(--ease-reveal)}
.edit-overlay.show .edit-sheet{transform:translateY(0)}
@media(min-width:720px){.edit-overlay{align-items:center;padding:24px}.edit-sheet{border:1px solid var(--slate)}}
.edit-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.edit-close{background:transparent;border:1px solid var(--slate);color:var(--pewter);width:36px;height:36px;font-size:20px;line-height:1;cursor:pointer;padding:0;transition:color 150ms ease-out,border-color 150ms ease-out}
.edit-close:hover{color:var(--parchment);border-color:var(--pewter)}
.edit-actions{margin-top:28px;display:flex;gap:10px;justify-content:space-between}
.edit-actions .btn{flex:1}
.shell-reading.regenerating>*:not(.regen-veil){opacity:0.4;transition:opacity 360ms ease-out;pointer-events:none}
.regen-veil{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;background:rgba(13,13,17,0.4);opacity:0;transition:opacity 360ms ease-out;pointer-events:none}

  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('viewBox', '0 0 100 100');
  svg.setAttribute('fill', 'none');

  if (size != null) { svg.setAttribute('width', size); svg.setAttribute('height', size); }
  if (ariaLabel) { svg.setAttribute('role','img'); svg.setAttribute('aria-label', ariaLabel); }
  else svg.setAttribute('aria-hidden','true');
  const g = document.createElementNS(NS, 'g');
  g.setAttribute('stroke','rgba(237,232,220,0.45)');
  g.setAttribute('stroke-width','0.8');
  g.setAttribute('fill','none');

  for (const [x1,y1,x2,y2] of lines) {
    const ln = document.createElementNS(NS,'line');
    ln.setAttribute('x1',x1); ln.setAttribute('y1',y1);
    ln.setAttribute('x2',x2); ln.setAttribute('y2',y2);
    g.appendChild(ln);
  }

  let pIdx = 0;

    c.setAttribute('cx',cx); c.setAttribute('cy',cy); c.setAttribute('r',r);
    c.setAttribute('fill', gold ? '#C8A96E' : '#EDE8DC');
    c.setAttribute('class', gold ? 'mk-gold' : `mk-pt mk-pt-${pIdx++}`);
    svg.appendChild(c);
  }
  return svg;
}

const el = (tag, attrs = {}, ...kids) => {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') n.className = v;
    else if (k === 'html') n.innerHTML = v;
    else if (k.startsWith('on')) n.addEventListener(k.slice(2), v);
    else if (v === false || v == null) continue;
    else if (v === true) n.setAttribute(k, '');
    else n.setAttribute(k, v);
  }
  for (const k of kids.flat()) {
    if (k == null) continue;
    n.appendChild(typeof k === 'string' ? document.createTextNode(k) : k);
  }
  return n;
};

const SIGN_NAMES = ['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];

function lookupSabian(lon) {
  const normLon = ((lon % 360) + 360) % 360;
  const signIdx = Math.floor(normLon / 30);
  const signName = SIGN_NAMES[signIdx];
  const degInSign = normLon % 30;
  const degree = Math.max(1, Math.ceil(degInSign)); // round up, min 1
  const entry = SABIAN_DATA[signName][degree];
  return { sign: signName, degree, symbol: entry[0], keyword: entry[1] };
}

/* ─── Astronomy (Meeus Astronomical Algorithms + JPL low-precision elements) ─── */
const D2R = Math.PI / 180, R2D = 180 / Math.PI;
function norm360(x) { return ((x % 360) + 360) % 360; }
function julianDay(y, m, d, hourUT) {
  if (m <= 2) { y -= 1; m += 12; }
  const A = Math.trunc(y / 100);
  const B = 2 - A + Math.trunc(A / 4);
  return Math.trunc(365.25 * (y + 4716)) + Math.trunc(30.6001 * (m + 1)) + d + hourUT / 24 + B - 1524.5;
}
function meanObliquity(T) {
  // Meeus Eq. 22.2 — good to ~1″ for ±2000 years
  return 23.4392911 - 0.0130042 * T - 1.64e-7 * T*T + 5.04e-7 * T*T*T;
}
function gmst(JD) {
  // Greenwich Mean Sidereal Time in degrees, Meeus Eq. 12.4
  const T = (JD - 2451545.0) / 36525.0;
  const g = 280.46061837 + 360.98564736629 * (JD - 2451545.0)
          + 0.000387933 * T*T - T*T*T / 38710000.0;
  return norm360(g);
}

/* Sun ecliptic longitude (Meeus Ch. 25) — accurate to ~0.01° */
function sunLongitudeFromJD(JD) {
  const T = (JD - 2451545.0) / 36525.0;
  const M = norm360(357.52911 + 35999.05029 * T - 0.0001537 * T*T) * D2R;
  const C = (1.914602 - 0.004817 * T - 0.000014 * T*T) * Math.sin(M)
          + (0.019993 - 0.000101 * T) * Math.sin(2 * M)
          + 0.000289 * Math.sin(3 * M);
  return norm360(280.46646 + 36000.76983 * T + 0.0003032 * T*T + C);
}
function sunLongitude(y, m, d, hourUT) { return sunLongitudeFromJD(julianDay(y, m, d, hourUT)); }

/* Moon ecliptic longitude (Meeus Ch. 47, top 20 terms in longitude) — accurate to ~0.3° */
function moonLongitudeFromJD(JD) {
  const T = (JD - 2451545.0) / 36525.0;
  const Lp = norm360(218.3164477 + 481267.88123421 * T - 0.0015786 * T*T + T*T*T/538841 - T*T*T*T/65194000);
  const D  = norm360(297.8501921 + 445267.1114034 * T - 0.0018819 * T*T + T*T*T/545868) * D2R;
  const M  = norm360(357.5291092 + 35999.0502909 * T - 0.0001536 * T*T) * D2R;
  const Mp = norm360(134.9633964 + 477198.8675055 * T + 0.0087414 * T*T) * D2R;
  const F  = norm360(93.2720950  + 483202.0175233 * T - 0.0036539 * T*T) * D2R;
  const E  = 1 - 0.002516 * T - 0.0000074 * T*T;
  const terms = [
    [6288774, 0, 0, 1, 0],
    [1274027, 2, 0,-1, 0],
    [ 658314, 2, 0, 0, 0],
    [ 213618, 0, 0, 2, 0],
    [-185116, 0, 1, 0, 0],
    [-114332, 0, 0, 0, 2],
    [  58793, 2, 0,-2, 0],
    [  57066, 2,-1,-1, 0],
    [  53322, 2, 0, 1, 0],
    [  45758, 2,-1, 0, 0],
    [ -40923, 0, 1,-1, 0],
    [ -34720, 1, 0, 0, 0],
    [ -30383, 0, 1, 1, 0],
    [  15327, 2, 0, 0,-2],
    [ -12528, 0, 0, 1, 2],
    [  10980, 0, 0, 1,-2],
    [  10675, 4, 0,-1, 0],
    [  10034, 0, 0, 3, 0],
    [   8548, 4, 0,-2, 0],
    [  -7888, 2, 1,-1, 0],
  ];
  let sum = 0;
  for (const [amp, dD, dM, dMp, dF] of terms) {
    const arg = dD*D + dM*M + dMp*Mp + dF*F;
    const Efac = Math.abs(dM) === 1 ? E : (Math.abs(dM) === 2 ? E*E : 1);
    sum += amp * Efac * Math.sin(arg);
  }
  return norm360(Lp + sum / 1000000);
}

function solveKepler(M, e) {
  // Newton's method, M in radians
  let E = M + e * Math.sin(M);
  for (let i = 0; i < 8; i++) {
    const dE = (E - e * Math.sin(E) - M) / (1 - e * Math.cos(E));
    E -= dE;
    if (Math.abs(dE) < 1e-10) break;
  }
  return E;
}
function heliocentricEcliptic(planet, T) {
  const p = PLANET_ELEMENTS[planet];
  const a  = p.a[0]  + p.a[1]  * T;
  const e  = p.e[0]  + p.e[1]  * T;
  const I  = (p.I[0] + p.I[1]  * T) * D2R;
  const L  = norm360(p.L[0]  + p.L[1]  * T);
  const lp = norm360(p.lp[0] + p.lp[1] * T);
  const ln = norm360(p.ln[0] + p.ln[1] * T);
  const omega = (lp - ln) * D2R;       // argument of perihelion
  const Omega = ln * D2R;
  const M = norm360(L - lp) * D2R;     // mean anomaly
  const E = solveKepler(M, e);
  const xp = a * (Math.cos(E) - e);
  const yp = a * Math.sqrt(1 - e*e) * Math.sin(E);
  const cw = Math.cos(omega), sw = Math.sin(omega);
  const cO = Math.cos(Omega), sO = Math.sin(Omega);
  const cI = Math.cos(I),     sI = Math.sin(I);
  const x = (cw*cO - sw*sO*cI)*xp + (-sw*cO - cw*sO*cI)*yp;
  const y = (cw*sO + sw*cO*cI)*xp + (-sw*sO + cw*cO*cI)*yp;
  const z = (sw*sI)*xp + (cw*sI)*yp;
  return { x, y, z };
}
function planetGeoLongitude(planet, JD) {
  const T = (JD - 2451545.0) / 36525.0;
  const p = heliocentricEcliptic(planet, T);
  const e = heliocentricEcliptic('Earth', T);
  return norm360(Math.atan2(p.y - e.y, p.x - e.x) * R2D);
}

/* Ascendant — Meeus Ch. 13, given JD (UT) and observer lat/lon */
function ascendantLongitude(JD, latDeg, lonDegEast) {
  const T = (JD - 2451545.0) / 36525.0;
  const eps = meanObliquity(T) * D2R;
  const lst = (gmst(JD) + lonDegEast) * D2R;
  const phi = latDeg * D2R;
  // λ_ASC = atan2( cos(LST), -(sin(LST)*cos(ε) + tan(φ)*sin(ε)) )
  const lam = Math.atan2(Math.cos(lst), -(Math.sin(lst)*Math.cos(eps) + Math.tan(phi)*Math.sin(eps)));
  return norm360(lam * R2D);
}

  return baziPillarFromIndex(idx);
}
function baziMonthPillar(sunLon, yearStemIdx) {
  // Tiger month begins at sun 315° (Lichun). Each branch covers 30° of sun longitude.
  const offset = ((sunLon - 315) % 360 + 360) % 360;
  const monthIdx = Math.floor(offset / 30);          // 0 = Tiger
  const branchIdx = (monthIdx + 2) % 12;
  // Five Tigers rule: month-of-Tiger stem from year stem
  const tigerStem = (yearStemIdx * 2 + 2) % 10;
  const stemIdx = (tigerStem + monthIdx) % 10;
  return { stem: BAZI_STEMS[stemIdx], stemElement: BAZI_STEM_ELEMENTS[stemIdx], branch: BAZI_BRANCHES[branchIdx], animal: BAZI_ANIMALS[branchIdx], stemIdx, branchIdx };
}
function baziHourPillar(localHour, dayStemIdx) {
  // 2-hour blocks. Zi covers 23:00–01:00 → branch 0.
  const branchIdx = Math.floor(((localHour + 1) % 24) / 2) % 12;
  // Five Rats rule
  const ziStem = (dayStemIdx * 2) % 10;
  const stemIdx = (ziStem + branchIdx) % 10;
  return { stem: BAZI_STEMS[stemIdx], stemElement: BAZI_STEM_ELEMENTS[stemIdx], branch: BAZI_BRANCHES[branchIdx], animal: BAZI_ANIMALS[branchIdx], stemIdx, branchIdx };
}

function proxyConfigured() {
  return CONFIG.proxyUrl && !CONFIG.proxyUrl.includes('YOUR-SUBDOMAIN');
}
async function streamToElement(userPrompt, container) {
  if (!proxyConfigured()) {
    throw new Error('Proxy URL not configured. Set CONFIG.proxyUrl in app.html to your deployed Worker (see proxy/README.md).');
  }
  const response = await fetch(`${CONFIG.proxyUrl}/anthropic`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: CONFIG.model,
      max_tokens: CONFIG.maxTokens,
      system: SYNTHESIS_SYSTEM,
      messages: [{ role: 'user', content: userPrompt }],
      stream: true,
    }),
  });
  if (!response.ok) {
    const errText = await response.text();
    throw new Error(`API ${response.status}: ${errText}`);
  }
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let sseBuffer = '';
  let rawText = '';
  let started = false;
  const streamDiv = document.createElement('div');
  const cursor = el('span', { class: 'cursor' });

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    sseBuffer += decoder.decode(value, { stream: true });
    const lines = sseBuffer.split('\n');
    sseBuffer = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6).trim();
      if (data === '[DONE]') continue;
      try {
        const evt = JSON.parse(data);
        if (evt.type === 'content_block_delta' && evt.delta?.type === 'text_delta') {
          if (!started) {
            container.innerHTML = '';
            container.appendChild(streamDiv);
            container.appendChild(cursor);
            started = true;
          }
          rawText += evt.delta.text;
          streamDiv.innerHTML = renderMd(rawText);
        }
      } catch (_) {}
    }
  }
  cursor.remove();
  container.innerHTML = renderMd(rawText);
  return rawText;
}

const ROSTER_KEY = 'uncharted.people.v1';
const derivedCache = {};
function loadRoster(){ try { return JSON.parse(localStorage.getItem(ROSTER_KEY) || '[]'); } catch(_){ return []; } }

function personSignature(p){
  return [p.birth_date, p.time_known ? p.birth_time : '?', (p.birth_place && p.birth_place.display) || (p.birth_place && p.birth_place.city) || '', (p.full_legal_name || p.display_name || '').toLowerCase().trim()].join('|');

function formToPerson(f, addedBy){
  return {
    id: 'p_' + Math.random().toString(36).slice(2,10),

    full_legal_name: f.name || null,
    birth_date: f.date,

    birth_place: f.geo ? { lat:f.geo.lat, lng:f.geo.lon, display:f.geo.display, city:f.city } : { lat:null, lng:null, display:null, city:f.city },
    enneagram: f.enneagramType ? { type:f.enneagramType, wing:f.enneagramWing||null, instinct:f.enneagramInstinct||null } : null,

  return {
    name: p.full_legal_name || p.display_name || '',
    date: p.birth_date,
    time: p.birth_time || '',
    timeUnknown: !p.time_known,

// Save a person, de-duped by birth signature. Returns the stored (or pre-existing) person.
function upsertPerson(f, addedBy){
  const list = loadRoster();
  const candidate = formToPerson(f, addedBy);
  const sig = personSignature(candidate);
  const existing = list.find(p => personSignature(p) === sig);
  if (existing) return existing;
  list.push(candidate);
  saveRoster(list);
  return candidate;
}
function derivedChartFor(person){
  if (derivedCache[person.id]) return derivedCache[person.id];

  derivedCache[person.id] = c;
  return c;
}

function clearRoster(){ saveRoster([]); for (const k in derivedCache) delete derivedCache[k]; clearSelfId(); }

// Overwrite a stored person's birth data in place (used by roster Edit). Invalidates its derived cache.
function updatePerson(id, f){
  const list = loadRoster();
  const i = list.findIndex(p => p.id === id);
  if (i < 0) return null;
  list[i] = Object.assign(formToPerson(f, list[i].added_by), { id, added_at: list[i].added_at });
  saveRoster(list);
  delete derivedCache[id];
  return list[i];
}

function reduceNumber(n, allowMaster = true) {
  while (n > 9 && !(allowMaster && (n === 11 || n === 22 || n === 33))) {

async function fetchHD(form, utcOffset) {
  if (!CONFIG.hdEnabled || !proxyConfigured() || form.timeUnknown || !form.time) return null;
  const [y, m, d] = form.date.split('-').map(Number);
  const [h, min] = form.time.split(':').map(Number);
  const sign = utcOffset >= 0 ? '+' : '-';
  const absOff = Math.abs(utcOffset);
  const offStr = `${sign}${String(Math.trunc(absOff)).padStart(2,'0')}:${String(Math.round((absOff%1)*60)).padStart(2,'0')}`;
  const datetime = `${String(y).padStart(4,'0')}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}T${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}:00${offStr}`;
  try {
    const res = await fetch(`${CONFIG.proxyUrl}/hd`, {
      method: 'POST',
      headers: { 'Content-Type':'application/json' },
      body: JSON.stringify({ datetime }),
    });
    if (!res.ok) return null;
    return await res.json();
  } catch (_) { return null; }
}

function signOf(lon) { return SIGNS[Math.floor(norm360(lon) / 30)]; }
function degInSign(lon) { return norm360(lon) % 30; }

function computeChart(form, hdApiData) {
  const [y, m, d] = form.date.split('-').map(Number);
  // Estimate UTC offset from geocoded longitude. This is the largest known
  // inaccuracy — political timezones and historical DST aren't captured.
  // Accurate to ±1 hour for most places, which is fine for Sun/planets and
  // usually fine for Moon sign, but can shift Ascendant by ~15°.
  const estOffset = form.geo ? Math.round(form.geo.lon / 15) : 0;
  let hourUT = 12, hourLocal = 12;
  if (!form.timeUnknown && form.time) {
    const [h, min] = form.time.split(':').map(Number);
    hourLocal = h + min / 60;
    hourUT = hourLocal - estOffset;
  }
  const JD_UT = julianDay(y, m, d, hourUT);
  const JD_localNoon = julianDay(y, m, d, 12 - estOffset);

  // Sun, Moon, Inner planets — all calculated from JD
  const sunLon = sunLongitudeFromJD(JD_UT);
  const moonLon = moonLongitudeFromJD(JD_UT);
  const mercuryLon = planetGeoLongitude('Mercury', JD_UT);
  const venusLon = planetGeoLongitude('Venus', JD_UT);
  const marsLon = planetGeoLongitude('Mars', JD_UT);

/* ─── Markdown renderer ─── */
function renderMd(src) {
  let s = src.trim();
  s = s.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  s = s.replace(/^##\s+(.+)$/gm, '<h4 class="bp-sub">$1</h4>');
  s = s.replace(/ALIGNMENT_STATEMENT:\s*([^\n]+)/, '<p class="alignment-statement">$1</p>');
  s = s.replace(/<em>(Sabian Symbol[^<]+)<\/em>/g, '<p class="sabian"><em>$1</em></p>');
  s = s.split(/\n{2,}/).map(p => {
    p = p.trim();
    if (!p) return '';
    if (/^<(h4|p)/.test(p)) return p;
    return `<p>${p.replace(/\n/g, ' ')}</p>`;
  }).join('\n');
  return s;
}

function stripMd(s) {
  return s.replace(/^##\s+/gm,'').replace(/\*\*([^*]+)\*\*/g,'$1').replace(/\*([^*]+)\*/g,'$1').replace(/ALIGNMENT_STATEMENT:\s*/,'— ').trim();
}

/* ─── Geocoding (parameterized by the form-state it writes into) ─── */
function setupGeocode(input, statusEl) { setupGeocodeFor(input, statusEl, state.form); }
function setupGeocodeFor(input, statusEl, fstate) {
  let timer = null, last = '';
  input.addEventListener('input', () => {
    fstate.city = input.value;
    fstate.geo = null;
    const q = input.value.trim();
    statusEl.textContent = '';
    statusEl.className = 'field-help';
    if (timer) clearTimeout(timer);
    if (q.length < 3 || q === last) return;
    last = q;
    statusEl.textContent = 'Looking up…';
    timer = setTimeout(() => geocodeInto(q, statusEl, fstate), 600);
  });
}
async function geocodeInto(q, statusEl, fstate) {
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(q)}`, { headers: {'Accept':'application/json'} });
    if (!res.ok) throw new Error();
    const data = await res.json();
    if (!data.length) { statusEl.textContent = "Couldn't find that city. Try adding the country, or use coordinates."; statusEl.className = 'field-help err'; return; }
    const r = data[0];
    fstate.geo = { lat: parseFloat(r.lat), lon: parseFloat(r.lon), display: r.display_name };
    statusEl.textContent = `${Number(r.lat).toFixed(2)}°${r.lat>=0?'N':'S'} · ${Number(r.lon).toFixed(2)}°${r.lon>=0?'E':'W'} · ${r.display_name.split(',').slice(-3).join(',').trim()}`;
    statusEl.className = 'field-help ok';
  } catch (_) { statusEl.textContent = "Couldn't reach the geocoder. Continuing without coordinates."; statusEl.className = 'field-help err'; }
}

function field({id, label, labelTrail, help, helpEl, input}) {

function validate() {
  const errs = [];
  const f = state.form;
  if (!f.name || f.name.trim().length < 2) errs.push('Name is empty. Use the name on the birth certificate.');
  if (!f.date) errs.push('Birth date is empty.');
  if (!f.timeUnknown && !f.time) errs.push("Birth time is empty. If you don't know it, use the toggle above — don't guess.");
  if (!f.city || f.city.trim().length < 2) errs.push('Birth city is empty.');
  return errs;
}

/* ─── Reading lifecycle — one core reading, plus optional addons ─────────────
   The form-filler is always "you": the core natal reading. Two independent
   toggles layer on additional sections in the SAME document — a relationship
   (you + someone) and a location (you + a place). Each addon computes its own
   data and renders its own §section; nothing replaces the core reading. */
async function startReading() {
  state.mode = state.relationship.enabled ? 'relational' : 'single';   // legacy flag, kept for any external readers
  state.reading = { blueprint:'', deepDive:{}, glossary:{} };
  state.relReading = { blueprint:'', deepDive:{} };
  ddInit();
  state.generating = true;
  // Core "you" chart. With a relationship addon, both charts come from the
  // deterministic roster-derived path so the pair stays symmetric.
  if (state.relationship.enabled) {
    const self  = upsertSelf(state.form);
    const other = upsertPerson(state.form2, self.id);
    state.chart  = derivedChartFor(self);
    state.chartB = derivedChartFor(other);
    await Promise.all([ enrichHD(state.chart, state.form), enrichHD(state.chartB, state.form2) ]);
    state.synastry = computeSynastry(state.chart, state.chartB);
  } else {
    // Solo: compute directly. Self is upserted by the form submit (not here), so
    // reading a saved roster person solo never overwrites "you".
    const estOffset = state.form.geo ? Math.round(state.form.geo.lon / 15) : 0;
    state.hdData = await fetchHD(state.form, estOffset);
    state.chart = computeChart(state.form, state.hdData);
  }
  // Astrocartography (for the core map section and any location addon) needs a
  // known birth time + located birthplace. Computed once, reused by both.
  state.acg = acgAvailable() ? computeAstrocartography(state.form) : null;
  // Navigate the moment chart data is ready — block only on the Blueprints,
  // never on the Deep Dives or the addon streams.
  renderReading();
  await streamBlueprint();
  if (state.relationship.enabled) await streamRelBlueprint();
  state.generating = false;
  const copyBtn = $('#copy-btn');
  if (copyBtn) copyBtn.classList.add('show');
  // Fire-and-forget: race the reader on every layer present.
  if (state.acg) { streamMapDigest(); if (state.location.enabled) streamLocationReading(); }
  prefetchDeepDive();
}

// Astrocartography is only meaningful with a known birth time and a located
// birthplace (it maps where each planet was angular at the exact moment).
function acgAvailable(){
  return !state.form.timeUnknown && !!state.form.geo && !!(state.chart && state.chart.western && state.chart.western.rising);
}

/* ─── Astrocartography (relocation: "you + a place") ──────────────────────

  ['Buenos Aires',-34.60,-58.38],['Rio de Janeiro',-22.91,-43.17],
  ['London',51.51,-0.13],['Paris',48.86,2.35],['Madrid',40.42,-3.70],['Rome',41.90,12.50],

function acgWrap180(x){ return ((x + 180) % 360 + 360) % 360 - 180; }
function acgEquatorial(lon, eps){
  const lr = lon*D2R, er = eps*D2R;
  return {
    ra:  norm360(Math.atan2(Math.cos(er)*Math.sin(lr), Math.cos(lr))*R2D),
    dec: Math.asin(Math.sin(er)*Math.sin(lr))*R2D,

  if (arg < -1 || arg > 1) return null;       // circumpolar / never rises here
  const H0 = Math.acos(arg)*R2D;
  return { asc: acgWrap180(ra - H0 - GMST), dsc: acgWrap180(ra + H0 - GMST) };
}
function computeAstrocartography(form){
  // Mirror computeChart's JD / offset derivation exactly so positions match.
  const [y,m,d] = form.date.split('-').map(Number);
  const estOffset = form.geo ? Math.round(form.geo.lon/15) : 0;
  let hourUT = 12;
  if (!form.timeUnknown && form.time){ const [h,mi] = form.time.split(':').map(Number); hourUT = h + mi/60 - estOffset; }

    Sun: sunLongitudeFromJD(JD), Moon: moonLongitudeFromJD(JD),
    Mercury: planetGeoLongitude('Mercury',JD), Venus: planetGeoLongitude('Venus',JD),
    Mars: planetGeoLongitude('Mars',JD), Jupiter: planetGeoLongitude('Jupiter',JD),
    Saturn: planetGeoLongitude('Saturn',JD), Uranus: planetGeoLongitude('Uranus',JD),
    Neptune: planetGeoLongitude('Neptune',JD), Pluto: planetGeoLongitude('Pluto',JD),
  };

    const lon = lons[p];
    const { ra, dec } = acgEquatorial(lon, eps);
    const asc=[], dsc=[];
    for (const phi of lats){ const h = acgHorizon(ra,dec,phi,GMST); if (h){ asc.push([phi,h.asc]); dsc.push([phi,h.dsc]); } }

}
function acgLineLonAtLat(curve, lat){
  for (let i=0;i<curve.length-1;i++){

function acgNearPlace(acg, lat, lng, orb){

function acgDignity(chart, acg, planet){

}
function acgFactsForPlace(acg, chart, form, place){
  const orbNear = 5;                            // generous, so there's always an honest verdict
  const hits = acgNearPlace(acg, place.lat, place.lng, orbNear);
  const L=[];
  L.push(`READER: ${form.name} (you). Born ${form.date}${form.timeUnknown?'':' at '+form.time} in ${form.geo?.display||form.city}.`);
  if (chart.western.rising) L.push(`Rising sign: ${chart.western.rising.sign} (its ruler, ${ACG_RULER[chart.western.rising.sign]}, is your chart ruler).`);
  L.push(`PLACE BEING READ: ${place.name} (${place.lat.toFixed(2)}°, ${place.lng.toFixed(2)}°).`);
  L.push('');
  L.push(`PLANETARY LINES NEAR ${place.name.toUpperCase()} (within ${orbNear}° longitude; ~70 mi per degree, influence strongest under ~2°):`);
  if (!hits.length) L.push('  None within 5°. Astrocartographically quiet — no planet is angular nearby. Say so plainly; do not invent a line.');

function acgRegionBounds(lat, lng){

function acgMapSVG(acg, opts){

  const inLon = lo => lo>=lonMin && lo<=lonMax;

  const Y = la => MTOP + (latMax-la)/(latMax-latMin)*ph;
  const esc = t => String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;');

  s.push(`<rect width="${W}" height="${H}" fill="#11141b"/>`);
  s.push(`<rect x="${MX}" y="${MTOP}" width="${pw}" height="${ph}" fill="#171a22" stroke="#333a48"/>`);
  for (let lo=Math.ceil(lonMin/lonGrid)*lonGrid; lo<=lonMax; lo+=lonGrid){ const x=X(lo).toFixed(1); s.push(`<line x1="${x}" y1="${MTOP}" x2="${x}" y2="${MTOP+ph}" stroke="#262b36"/>`); s.push(`<text x="${x}" y="${MTOP+ph-3}" fill="#5b606b" font-size="8" text-anchor="middle">${lo}°</text>`); }

  for (const [nm,la,lo] of ACG_CITIES){ if (la<latMin||la>latMax||!inLon(lo)) continue; const cx=X(lo).toFixed(1), cy=Y(la).toFixed(1); s.push(`<circle cx="${cx}" cy="${cy}" r="1.8" fill="#aeb3bd"/>`); s.push(`<text x="${(+cx+3).toFixed(1)}" y="${(+cy+2.5).toFixed(1)}" fill="#6b7280" font-size="7">${esc(nm)}</text>`); }
  const dash={MC:'',IC:'2,3',ASC:'6,3',DSC:'6,3,1,3'};
  const drawMer=(lo,c,da,lab)=>{ if(!inLon(lo))return; const x=X(lo).toFixed(1); s.push(`<line x1="${x}" y1="${MTOP}" x2="${x}" y2="${MTOP+ph}" stroke="${c}" stroke-width="1.5" stroke-dasharray="${da}" opacity="0.9"/>`); s.push(`<text x="${x}" y="${MTOP+8}" fill="${c}" font-size="7" text-anchor="middle">${lab}</text>`); };
  const drawCurve=(curve,c,da,lab)=>{ let seg=[],segs=[],prev=null; for(const [la,lo] of curve){ const vis=inLon(lo)&&la>=latMin&&la<=latMax; if(prev!=null&&Math.abs(lo-prev)>180){segs.push(seg);seg=[];} if(!vis){ if(seg.length){segs.push(seg);seg=[];} prev=lo; continue; } seg.push([la,lo]); prev=lo; } segs.push(seg); let labeled=false; for(const sg of segs){ if(sg.length<2)continue; const pts=sg.map(([la,lo])=>`${X(lo).toFixed(1)},${Y(la).toFixed(1)}`).join(' '); s.push(`<polyline points="${pts}" fill="none" stroke="${c}" stroke-width="1.5" stroke-dasharray="${da}" opacity="0.9"/>`); if(!labeled){ const [la,lo]=sg[0]; s.push(`<text x="${(X(lo)+2).toFixed(1)}" y="${(Y(la)+7).toFixed(1)}" fill="${c}" font-size="7">${lab}</text>`); labeled=true; } } };
  for (const p of ACG_BODIES){ const b=acg.bodies[p], c=ACG_COLOR[p], g=ACG_ABBR[p]; drawMer(b.mc,c,dash.MC,g+' MC'); drawMer(b.ic,c,dash.IC,g+' IC'); drawCurve(b.asc,c,dash.ASC,g+' AS'); drawCurve(b.dsc,c,dash.DSC,g+' DS'); }
  const mark=(la,lo,col,lab)=>{ if(la<latMin||la>latMax||!inLon(lo))return; const cx=X(lo).toFixed(1),cy=Y(la).toFixed(1); s.push(`<circle cx="${cx}" cy="${cy}" r="5" fill="none" stroke="${col}" stroke-width="1.6"/>`); s.push(`<circle cx="${cx}" cy="${cy}" r="1.8" fill="${col}"/>`); s.push(`<text x="${(+cx+7).toFixed(1)}" y="${(+cy-5).toFixed(1)}" fill="${col}" font-size="9" font-weight="bold">${esc(lab)}</text>`); };
  if (opts.home) mark(opts.home.lat,opts.home.lng,'#ffd166',opts.home.name);
  if (opts.place) mark(opts.place.lat,opts.place.lng,'#39FF88',opts.place.name);
  s.push('</svg>');
  return s.join('');
}

// Sticky in-page navigation across the layers present. Anchor scroll only — the
// reading stays one document (the "Copy full reading" model depends on that).
// Active state and the header-height offset are wired up by initStickyNav().
function renderJumpNav(items){
  const nav = el('nav',{class:'jump-nav','aria-label':'Jump to section'});
  items.forEach(it => {
    const link = el('button',{type:'button',class:'jump-link','data-target':it.id,onclick:()=>{
      setActiveJumpLink(it.id);
      const t = document.getElementById(it.id);
      if (t) t.scrollIntoView({ behavior:'smooth', block:'start' });
    }}, it.label);
    nav.appendChild(link);
  });
  return nav;
}

function setActiveJumpLink(id){
  const nav = document.querySelector('.jump-nav'); if (!nav) return;
  let active = null;
  nav.querySelectorAll('.jump-link').forEach(l => {
    const on = l.getAttribute('data-target') === id;
    l.classList.toggle('is-active', on);
    if (on) active = l;
  });
  // Keep the active tab in view within the horizontally-scrolling strip.
  if (active && typeof nav.scrollTo === 'function') nav.scrollTo({ left: active.offsetLeft - nav.clientWidth/2 + active.clientWidth/2, behavior:'smooth' });
}

// Measure the (sticky) reading header so the jump-nav pins directly below it and
// section anchors clear the full sticky stack. Re-measured on resize / reflow.
let _stickyRO = null;
function syncStickyOffsets(){
  const shell = document.querySelector('.shell-reading'); if (!shell) return;
  const header = shell.querySelector('.app-header--reading');
  const nav = shell.querySelector('.jump-nav');
  const hh = header ? Math.round(header.getBoundingClientRect().height) : 0;
  const nh = nav ? Math.round(nav.getBoundingClientRect().height) : 0;
  shell.style.setProperty('--reading-header-h', hh + 'px');
  shell.style.setProperty('--sticky-stack-h', (hh + nh) + 'px');
}

// Scroll-spy: highlight the tab for the topmost section sitting under the sticky
// stack as the reader scrolls.
let _spyIO = null;
function initStickyNav(navItems){
  syncStickyOffsets();
  const shell = document.querySelector('.shell-reading'); if (!shell) return;
  const header = shell.querySelector('.app-header--reading');
  const nav = shell.querySelector('.jump-nav');
  if (_stickyRO) _stickyRO.disconnect();
  if (window.ResizeObserver){
    _stickyRO = new ResizeObserver(syncStickyOffsets);
    if (header) _stickyRO.observe(header);
    if (nav) _stickyRO.observe(nav);
  }
  if (!window.__stickyResizeBound){ window.addEventListener('resize', syncStickyOffsets, {passive:true}); window.__stickyResizeBound = true; }

  if (_spyIO) { _spyIO.disconnect(); _spyIO = null; }
  if (window.IntersectionObserver){
    const visible = new Set();
    const stack = parseInt(getComputedStyle(shell).getPropertyValue('--sticky-stack-h')) || 116;
    _spyIO = new IntersectionObserver((entries)=>{
      entries.forEach(e => { if (e.isIntersecting) visible.add(e.target.id); else visible.delete(e.target.id); });
      const top = navItems.find(it => visible.has(it.id));   // topmost in document order
      if (top) setActiveJumpLink(top.id);
    }, { rootMargin: `-${stack + 4}px 0px -62% 0px`, threshold: 0 });
    navItems.forEach(it => { const s = document.getElementById(it.id); if (s) _spyIO.observe(s); });
  }
  // Seed the first tab active before any scroll.
  if (navItems.length) setActiveJumpLink(navItems[0].id);
}

/* ─── Deep Dive: hybrid generation (background prefetch + lazy fallback) ───
   Each section has a job tracking its generation status. The Blueprint never
   blocks on these. After the Blueprint renders, prefetchDeepDive() generates
   the first CONFIG.deepDivePrefetch sections in display order; the rest stay
   lazy. Expanding a section either reveals ready content instantly or expands
   straight into an honest loading state — never into an empty container. */
const ddJobs = {}; // sectionId -> { status:'idle'|'loading'|'ready'|'error', text, promise, render, renderError }

function ddInit() {
  for (const k in ddJobs) delete ddJobs[k];
}
function ddJob(id) {
  if (!ddJobs[id]) ddJobs[id] = { status:'idle', text:'', promise:null, render:null, renderError:null };
  return ddJobs[id];
}

// Per-section glue so the core and relationship Deep Dives share ONE job system
// (dedup, prefetch, instant-ready reveal, background fill) while coexisting in the
// same document. Routing keys off section.kind ('rel' = relationship addon), not a
// global mode, so both can be live at once. Core sections carry no kind.
function ddKey(section) { return (section.kind ? section.kind + ':' : '') + section.id; }
function ddPromptFor(section) {
  return section.kind === 'rel'
    ? relDeepDivePrompt(section)
    : deepDivePrompt(state.chart, state.form, section);
}
function ddStore(section, text) {
  if (section.kind === 'rel') state.relReading.deepDive[section.id] = text;
  else state.reading.deepDive[section.id] = text;
}
function relSections() {
  return REL_TYPE_CONFIG[state.relationship.type].sections.map(s => Object.assign({ kind:'rel' }, s));
}

// Generate one section, deduplicated. Safe to call from both prefetch and
// expand — concurrent callers share the same in-flight promise.
function ensureDeepDive(section) {
  const job = ddJob(ddKey(section));
  if (job.status === 'ready') return Promise.resolve();
  if (job.status === 'loading') return job.promise;
  job.status = 'loading';
  job.promise = (async () => {
    try {
      const text = await llmText(ddPromptFor(section));
      job.text = text;
      job.status = 'ready';
      ddStore(section, text);
      if (job.render) job.render(text); // fill the section if it's open and waiting
    } catch (e) {
      job.status = 'error';
      if (job.renderError) job.renderError();
      throw e;
    }
  })();
  return job.promise;
}

// Background driver: race the reader by generating early sections of every
// layer present (core, plus the relationship addon when enabled), ahead of time.
async function prefetchDeepDive() {
  const lists = [DEEP_DIVE_SECTIONS];
  if (state.relationship.enabled) lists.push(relSections());
  for (const sections of lists) {
    const n = Math.min(CONFIG.deepDivePrefetch, sections.length);
    for (let i = 0; i < n; i++) {
      try { await ensureDeepDive(sections[i]); }
      catch (_) { /* stay silent in the background; surfaced if the user expands */ }
    }
  }
}

function deepDiveAccordion(section, idx) {
  const job = ddJob(ddKey(section));
  const body = el('div',{class:'acc-body',id:'dd-'+section.id+'-body'});
  let open = false;

  const showLoading = () => {
    body.innerHTML = '';
    body.appendChild(el('div',{class:'acc-loading'}, markEl({size:22,loading:true}), el('span',{},'Drawing this out.')));
  };
  const reveal = (text) => {
    body.innerHTML = renderMd(text);
    body.style.opacity='0'; body.style.transform='translateY(6px)';
    requestAnimationFrame(() => { body.style.transition='opacity 600ms cubic-bezier(0.16,1,0.3,1),transform 600ms cubic-bezier(0.16,1,0.3,1)'; body.style.opacity='1'; body.style.transform='translateY(0)'; });
  };
  const showError = () => { body.innerHTML = '<p class="err-inline">The synthesis didn\'t complete. This is usually an API key issue or a timeout. Try again.</p>'; };

  // Let a background completion fill this section if it's open and waiting.
  job.render = (text) => { if (open) reveal(text); };
  job.renderError = () => { if (open) showError(); };

  const header = el('button',{type:'button',class:'acc-header','aria-expanded':'false',onclick:()=>{
    open = header.classList.toggle('is-open');
    header.setAttribute('aria-expanded', open?'true':'false');
    body.classList.toggle('is-open', open);
    if (!open) return;
    if (job.status === 'ready') { reveal(job.text); return; }   // common case — instant, no fetch
    showLoading();                                              // never an empty box
    if (job.status !== 'loading') ensureDeepDive(section).catch(()=>{}); // lazy/retry; render hooks handle UI
  }},
    el('span',{class:'acc-num'},String(idx).padStart(2,'0')),
    el('span',{class:'acc-text'},
      el('span',{class:'acc-title'},section.title),
      el('span',{class:'acc-intro'},section.intro),
    ),
    el('span',{class:'acc-chevron','aria-hidden':'true'}),
  );
  return el('div',{class:'acc'},header,body);
}

async function loadGlossary(system, container) {
  const prompt = glossaryPrompt(state.chart, state.form, system);
  const text = await llmText(prompt);
  state.reading.glossary[system.id] = text;
  const html = text.split('\n').filter(Boolean).map(line => `<p class="gl-entry">${renderMd(line).replace(/^<p>|<\/p>$/g,'')}</p>`).join('');
  container.innerHTML = html;
  container.style.opacity = '0'; container.style.transform = 'translateY(6px)';
  requestAnimationFrame(() => { container.style.transition='opacity 600ms cubic-bezier(0.16,1,0.3,1),transform 600ms cubic-bezier(0.16,1,0.3,1)'; container.style.opacity='1'; container.style.transform='translateY(0)'; });
}

/* ─── Edit / regenerate ─── */
function editForm() { showEditModal(); }
function showEditModal() {
  if ($('#edit-modal')) return;
  const overlay = el('div',{id:'edit-modal',class:'edit-overlay'});
  const sheet = el('div',{class:'edit-sheet'});
  sheet.appendChild(el('div',{class:'edit-head'},el('p',{class:'eyebrow'},'Edit birth data'),el('button',{class:'edit-close',onclick:closeEditModal,type:'button','aria-label':'Close'},'×')));
  const form = el('form',{class:'form',novalidate:true});
  sheet.appendChild(form);
  form.appendChild(field({id:'e-name',label:'Name at birth',input:el('input',{id:'e-name',type:'text',value:state.form.name,oninput:e=>state.form.name=e.target.value})}));
  form.appendChild(field({id:'e-date',label:'Birth date',input:el('input',{id:'e-date',type:'date',value:state.form.date,oninput:e=>state.form.date=e.target.value})}));
  const ti = el('input',{id:'e-time',type:'time',value:state.form.time,disabled:state.form.timeUnknown,oninput:e=>state.form.time=e.target.value});
  const td = el('span',{class:'dot'+(state.form.timeUnknown?' is-on':'')});
  const tt = el('button',{type:'button',class:'time-toggle'+(state.form.timeUnknown?' is-on':''),onclick:()=>{state.form.timeUnknown=!state.form.timeUnknown;ti.disabled=state.form.timeUnknown;tt.classList.toggle('is-on',state.form.timeUnknown);td.classList.toggle('is-on',state.form.timeUnknown);}},td,'Time unknown');
  form.appendChild(field({id:'e-time',label:'Birth time',labelTrail:tt,input:ti}));
  const ch2 = el('p',{class:'field-help'});
  if (state.form.geo){ch2.textContent=`${state.form.geo.lat.toFixed(2)}°${state.form.geo.lat>=0?'N':'S'} · ${state.form.geo.lon.toFixed(2)}°${state.form.geo.lon>=0?'E':'W'}`;ch2.className='field-help ok';}
  const ci = el('input',{id:'e-city',type:'text',value:state.form.city});
  setupGeocode(ci, ch2);
  form.appendChild(field({id:'e-city',label:'Birth city',input:ci,helpEl:ch2}));
  const er2 = el('div',{class:'ennea-row'});
  er2.appendChild(el('select',{onchange:e=>state.form.enneagramType=e.target.value},el('option',{value:''},'Type'),...[1,2,3,4,5,6,7,8,9].map(n=>el('option',{value:'Type '+n,selected:state.form.enneagramType==='Type '+n},'Type '+n))));
  er2.appendChild(el('select',{onchange:e=>state.form.enneagramWing=e.target.value},el('option',{value:''},'Wing'),...[1,2,3,4,5,6,7,8,9].map(n=>el('option',{value:n,selected:state.form.enneagramWing==n},'w'+n))));
  er2.appendChild(el('select',{onchange:e=>state.form.enneagramInstinct=e.target.value},el('option',{value:''},'Instinct'),...['SP','SX','SO'].map(s=>el('option',{value:s,selected:state.form.enneagramInstinct===s},s))));
  form.appendChild(field({id:'e-type',label:'Enneagram',labelTrail:el('span',{class:'field-aside'},'optional'),input:er2,rawInput:true}));
  const errLine = el('p',{class:'form-err'});
  form.appendChild(errLine);
  form.appendChild(el('div',{class:'edit-actions'},
    el('button',{type:'button',class:'btn btn-ghost',onclick:closeEditModal},'Cancel'),
    el('button',{type:'submit',class:'btn btn-primary'},'Regenerate'),
  ));
  form.addEventListener('submit', async e => {
    e.preventDefault();
    const errs = validate();
    if (errs.length){errLine.textContent=errs[0];errLine.classList.add('show');return;}
    closeEditModal();
    await regenerateInPlace();
  });
  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
  requestAnimationFrame(()=>overlay.classList.add('show'));
  overlay.addEventListener('click', e=>{if(e.target===overlay)closeEditModal();});
}
function closeEditModal(){const o=$('#edit-modal');if(!o)return;o.classList.remove('show');setTimeout(()=>o.remove(),240);}
async function regenerateInPlace(){
  const shell = $('.shell-reading');
  shell.classList.add('regenerating');
  const veil = el('div',{class:'regen-veil'}, markEl({size:96,loading:true}), el('p',{class:'regen-msg'},'Regenerating'));
  shell.appendChild(veil);
  requestAnimationFrame(()=>veil.classList.add('show'));
  await new Promise(r=>setTimeout(r,600));
  // Re-run the full lifecycle so every layer present (core, relationship,
  // location, map) recomputes and re-streams. renderReading replaces the veil.
  await startReading();
}

/* ─── Copy ─── */
async function copyFullReading(){
  const f = state.form, c = state.chart;
  const dt = new Date(f.date+'T00:00:00').toLocaleDateString('en-US',{day:'numeric',month:'long',year:'numeric'});
  let out = `un/charted — natal chart synthesis\n${f.name} · ${dt}${f.timeUnknown?'':' · '+f.time} · ${f.geo?.display||f.city}\n\n———\n\nTHE BLUEPRINT\n\n`;
  out += stripMd(state.reading.blueprint)+'\n\n———\n\nTHE DEEP DIVE\n\n';
  for (let i=0; i<DEEP_DIVE_SECTIONS.length; i++){
    const s=DEEP_DIVE_SECTIONS[i];
    out+=`${String(i+1).padStart(2,'0')} · ${s.title}\n${s.intro}\n\n`;
    out+=(state.reading.deepDive[s.id]?stripMd(state.reading.deepDive[s.id]):'[ Not yet expanded ]')+'\n\n';
  }
  if (state.acg && state.reading.mapDigest){
    out+='———\n\nYOUR MAP\n\n'+stripMd(state.reading.mapDigest)+'\n\n';
  }
  if (state.relationship.enabled){
    const cfg = REL_TYPE_CONFIG[state.relationship.type];
    const b = (state.form2.name.trim().split(/\s+/)[0]) || state.form2.name;
    out+=`———\n\nTHE RELATIONSHIP (${cfg.label} · with ${b})\n\n`;
    out+=(state.relReading.blueprint?stripMd(state.relReading.blueprint):'[ Not yet generated ]')+'\n\n';
    cfg.sections.forEach((s,i)=>{
      out+=`${String(i+1).padStart(2,'0')} · ${s.title}\n${s.intro}\n\n`;
      out+=(state.relReading.deepDive[s.id]?stripMd(state.relReading.deepDive[s.id]):'[ Not yet expanded ]')+'\n\n';
    });
  }
  if (state.location.enabled && state.reading.locationReading){
    out+=`———\n\n${locationPlace().name.toUpperCase()} (relocation)\n\n`+stripMd(state.reading.locationReading)+'\n\n';
  }
  out+='———\n\nYOUR CHART AT A GLANCE\n\n';
  for (const sys of SYSTEMS){
    if(sys.optional&&!c.enneagram)continue;
    if(sys.id==='human'&&!c.humanDesign)continue;
    out+=`${sys.name}\n`+(state.reading.glossary[sys.id]?stripMd(state.reading.glossary[sys.id]):'[ Not yet expanded ]')+'\n\n';
  }
  try {
    await navigator.clipboard.writeText(out);
    const btn=$('#copy-btn');
    const orig=btn.textContent;
    btn.textContent='Copied';
    setTimeout(()=>{btn.textContent=orig;},2000);
  } catch(_){alert("Couldn't copy. Your browser may be blocking clipboard access.");}
}

/* ─── Relational reading entry — relationship is now an addon on the core
   reading (core + addon), so this just flips the toggle and runs the unified
   lifecycle. Kept as a named entry for the roster "read them with you" path. ─── */
async function startRelationalReading(){
  state.relationship.enabled = true;
  return startReading();
}

async function streamRelBlueprint(){
  const body = $('#rel-blueprint-body');
  body.innerHTML = '';
  body.appendChild(el('div',{class:'bp-loading'}, markEl({size:26,loading:true}), el('span',{}, 'Reading the space between two charts. The relationship is its own thing, and it takes a moment to see it.')));
  try {
    const text = await streamToElement(relBlueprintPrompt(), body);
    state.relReading.blueprint = text;
  } catch (e) {
    body.innerHTML = `<p class="err-inline">The synthesis didn't complete. ${e.message || 'Check the connection and try again.'}</p>`;
    throw e;
  }
}

/* ─── Roster ("Your People") ─── */
function goForm(){ renderForm(); }
function goRoster(){ renderRoster(); }
function resetFormsForNew(){
  state.form = BLANK_PERSON_FORM();
  state.form2 = BLANK_PERSON_FORM();
  state.relationship = { enabled:false, type:'romantic' };
  state.location = { enabled:false, city:'', geo:null };
}
function personMeta(p){
  const dt = p.birth_date ? new Date(p.birth_date+'T00:00:00').toLocaleDateString('en-US',{day:'numeric',month:'short',year:'numeric'}) : '—';
  const place = (p.birth_place && (p.birth_place.display ? p.birth_place.display.split(',').slice(0,2).join(', ').trim() : p.birth_place.city)) || '';
  const time = p.time_known ? p.birth_time : 'time unknown';
  return [dt, time, place].filter(Boolean).join(' · ');
}
function navLink(){ return el('button',{type:'button',class:'nav-link',onclick:goRoster},'⌂ Your people'); }

function renderRoster(){
  const root = $('#app');
  root.innerHTML = '';
  root.appendChild(el('div',{class:'orbit-backdrop','aria-hidden':'true'},
    el('div',{class:'ring r1'}),el('div',{class:'ring r2'}),el('div',{class:'ring r3'}),el('div',{class:'pt'})));
  const shell = el('div',{class:'shell shell-form'});
  root.appendChild(shell);
  shell.appendChild(el('header',{class:'app-header app-header--form'},
    el('span',{class:'lockup','aria-label':'un/charted'},
      markEl({ariaLabel:null}),
      el('span',{class:'wm'},el('span',{class:'prefix'},'un/'),el('span',{class:'resolve'},'charted')),
    ),
    el('p',{class:'tagline'},'The map no one else saw coming.'),
  ));
  shell.appendChild(el('h1',{class:'roster-title'},'Your people'));
  shell.appendChild(el('p',{class:'roster-sub'},'Everyone whose chart lives on this device. Read any of them — or read them with you.'));

  const self = getSelf();
  const others = savedOthers();

  shell.appendChild(el('p',{class:'roster-sectlabel'},'You'));
  if (self) shell.appendChild(personCard(self, true));
  else shell.appendChild(el('p',{class:'roster-empty'},'You haven’t set yourself yet. Start a reading and the chart you enter becomes you.'));

  if (others.length){
    shell.appendChild(el('p',{class:'roster-sectlabel'},'Saved people'));
    others.forEach(p => shell.appendChild(personCard(p, false)));
  }

  const actions = el('div',{class:'roster-actions'});
  actions.appendChild(el('button',{type:'button',class:'btn btn-primary btn-block',onclick:()=>{ resetFormsForNew(); goForm(); }},'New reading'));
  if (loadRoster().length){
    actions.appendChild(el('button',{type:'button',class:'btn btn-ghost btn-block',onclick:()=>{ if(confirm('Forget everyone stored on this device? This deletes their birth data from this browser.')){ clearRoster(); renderRoster(); } }},'Forget everyone'));
  }
  shell.appendChild(actions);
  shell.appendChild(el('footer',{class:'form-footer'},el('p',{},'Stored only on this device. Nothing is uploaded. Delete anyone, anytime.')));
}

function personCard(p, isSelf){
  const actions = el('div',{class:'pc-actions'});
  if (isSelf){
    actions.appendChild(el('button',{type:'button',class:'pc-chip gold',onclick:()=>readPerson(p)},'Read'));
    actions.appendChild(el('button',{type:'button',class:'pc-chip',onclick:()=>editPersonModal(p)},'Edit'));
  } else {
    actions.appendChild(el('button',{type:'button',class:'pc-chip gold',onclick:()=>readWithYou(p)},'With you'));
    actions.appendChild(el('button',{type:'button',class:'pc-chip',onclick:()=>readPerson(p)},'Read'));
    actions.appendChild(el('button',{type:'button',class:'pc-chip danger',onclick:()=>{ if(confirm(`Forget ${p.display_name||'this person'}? This deletes their birth data from this browser.`)){ deletePerson(p.id); renderRoster(); } }},'Forget'));
  }
  return el('div',{class:'person-card'+(isSelf?' self':'')},
    el('div',{class:'pc-body'},
      el('span',{class:'pc-name'}, p.display_name || 'Unnamed'),
      el('span',{class:'pc-meta'}, personMeta(p)),
    ),
    actions,
  );
}

// Read one person's single chart.
function readPerson(p){
  state.form = personToForm(p);
  state.relationship.enabled = false;
  state.location = { enabled:false, city:'', geo:null };
  startReading();
}
// Read a saved person against you — ask the relationship type first.
function readWithYou(p){
  const self = getSelf();
  if (!self){ alert('Set yourself first: start a reading and the chart you enter becomes you.'); return; }
  pickRelTypeModal(p, (type) => {
    state.form = personToForm(self);
    state.form2 = personToForm(p);
    state.relationship = { enabled:true, type };
    state.location = { enabled:false, city:'', geo:null };
    startRelationalReading();
  });
}

// Edit a stored person's birth data in place (reuses the modal chrome + personFieldset).
function editPersonModal(person){
  if ($('#edit-modal')) return;
  const tmp = personToForm(person);
  const overlay = el('div',{id:'edit-modal',class:'edit-overlay'});
  const sheet = el('div',{class:'edit-sheet'});
  sheet.appendChild(el('div',{class:'edit-head'},el('p',{class:'eyebrow'},'Edit birth data'),el('button',{class:'edit-close',type:'button','aria-label':'Close',onclick:closeEditModal},'×')));
  const form = el('form',{class:'form',novalidate:true});
  sheet.appendChild(form);
  personFieldset(tmp,'edit').forEach(n => form.appendChild(n));
  const errLine = el('p',{class:'form-err'});
  form.appendChild(errLine);
  form.appendChild(el('div',{class:'edit-actions'},
    el('button',{type:'button',class:'btn btn-ghost',onclick:closeEditModal},'Cancel'),
    el('button',{type:'submit',class:'btn btn-primary'},'Save'),
  ));
  form.addEventListener('submit', e => {
    e.preventDefault();
    const errs = validatePerson(tmp, 'This person');
    if (errs.length){ errLine.textContent = errs[0]; errLine.classList.add('show'); return; }
    updatePerson(person.id, tmp);
    closeEditModal();
    renderRoster();
  });
  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
  requestAnimationFrame(()=>overlay.classList.add('show'));
  overlay.addEventListener('click', e => { if (e.target === overlay) closeEditModal(); });
}

// "Who is this person to you?" — pick a relationship type, then read.
function pickRelTypeModal(person, onPick){
  if ($('#edit-modal')) return;
  const overlay = el('div',{id:'edit-modal',class:'edit-overlay'});
  const sheet = el('div',{class:'edit-sheet'});
  sheet.appendChild(el('div',{class:'edit-head'},el('p',{class:'eyebrow'},'Read with you'),el('button',{class:'edit-close',type:'button','aria-label':'Close',onclick:closeEditModal},'×')));
  sheet.appendChild(el('div',{class:'relpick-head'}, el('p',{class:'relpick-q'},`Who is ${person.display_name || 'this person'} to you?`)));
  const grid = el('div',{class:'relpick-grid'});
  REL_TYPE_ORDER.forEach(t => grid.appendChild(el('button',{type:'button',class:'rel-type-opt',onclick:()=>{ closeEditModal(); onPick(t); }}, REL_TYPE_CONFIG[t].label)));
  sheet.appendChild(grid);
  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
  requestAnimationFrame(()=>overlay.classList.add('show'));
  overlay.addEventListener('click', e => { if (e.target === overlay) closeEditModal(); });
}

/* ─── Boot ─── */
document.addEventListener('DOMContentLoaded', ()=>{ loadRoster().length ? renderRoster() : renderForm(); });
</script>
